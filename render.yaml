# Render Blueprint for sports-oracle-python (free tier).
#
# This provisions ONLY the managed Postgres database.
# The nightly pipeline runs on GitHub Actions (free) — see
# .github/workflows/nightly.yml.
#
# Render removed free cron jobs in 2024, so paying $7/mo on the Starter
# plan is the alternative if you'd rather run the cron on Render itself.
#
# ── Free tier caveats ────────────────────────────────────────────────
# Free Postgres on Render:
#   - 1 GB storage
#   - Database expires 90 days after creation — before then you must
#     upgrade to a paid plan OR pg_dump and migrate to a new free DB.
#   - Our full 7-season ingest fills ~600 MB, well within the cap.

databases:
  - name: sports-oracle-db
    databaseName: sports_oracle
    user: sportsoracle
    plan: free
    postgresMajorVersion: "16"

# No services here — the pipeline runs on GitHub Actions.
